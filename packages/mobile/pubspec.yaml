name: rulesnap
description: "RuleSnap - Board game rules reference app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^14.2.0
  provider: ^6.1.2
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  kiri_check: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/common/
    - assets/i18n/castles-of-burgundy/
    - assets/i18n/quacks/
    - assets/images/
